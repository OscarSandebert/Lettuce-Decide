<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kamera</title>

  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 16px;
      text-align: center;
    }

    video,
    canvas,
    img {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      margin-top: 16px;
    }

    button,
    a {
      display: inline-block;
      margin: 12px 6px;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      background: #222;
      color: white;
      text-decoration: none;
      cursor: pointer;
      font-size: 16px;
    }

    a {
      background: #0a7;
    }

    /* Code for pop-up */
    .popup-overlay {
      display: none;

      position: fixed;
      top: 0;
      left: 0;

      width: 100%;
      height: 100%;

      background: rgba(0, 0, 0, 0.6);

      justify-content: center;
      align-items: center;

      z-index: 1000;
    }

    .popup-box {
      background: white;

      width: 90%;
      max-width: 420px;

      border-radius: 16px;

      padding: 24px;

      position: relative;

      text-align: left;

      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }

    .close-popup {
      position: absolute;

      top: 10px;
      right: 10px;

      background: transparent;

      color: black;

      border: none;

      font-size: 24px;

      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>Ta en bild</h1>

  <video id="video" autoplay playsinline></video>

  <div>
    <button id="takePhoto">Ta bild</button>
  </div>

  <canvas id="canvas" style="display: none;"></canvas>

  <h2>Din bild</h2>
  <img id="photo" alt="Tagen bild visas här" />
  <div id="result" style="margin-top: 16px; font-size: 18px;"></div>

  <!-- Code for pop-up -->
  <div id="popupOverlay" class="popup-overlay">

    <div class="popup-box">

      <button id="closePopup" class="close-popup">
        &times;
      </button>

      <div id="popupContent"></div>

    </div>

  </div>

  <div>
    <a id="downloadLink" download="bild.jpg" style="display: none;">
      Spara bild
    </a>
  </div>

  <script type="module">
    import { BrowserMultiFormatReader } from "https://cdn.jsdelivr.net/npm/@zxing/browser@latest/+esm";

    const reader = new BrowserMultiFormatReader();

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const photo = document.getElementById("photo");
    const takePhotoButton = document.getElementById("takePhoto");
    const downloadLink = document.getElementById("downloadLink");
    const resultElement = document.getElementById("result");
    const popupOverlay = document.getElementById("popupOverlay"); ///Pop-up
    const popupContent = document.getElementById("popupContent"); ///Pop-up
    const closePopupButton = document.getElementById("closePopup");  ///Pop-up

    function openPopup(html) {
      popupContent.innerHTML = html;
      popupOverlay.style.display = "flex";
    }

    function closePopup() {
      popupOverlay.style.display = "none";
    }

    closePopupButton.addEventListener("click", closePopup);

    popupOverlay.addEventListener("click", (e) => {
      if (e.target === popupOverlay) {
        closePopup();
      }
    });

    async function lookupBarcode(barcode) {
      resultElement.textContent = "Söker produkt...";

      const res = await fetch(`/api/lookup/${barcode}`);
      if (!res.ok) {
        openPopup(`
        <h2>Produkten hittades inte</h2>
        <p>Streckkoden finns inte i databasen.</p>
      `);
        return;
      }

      const d = await res.json();
      if (d.source === "DABAS") {
        openPopup(
          `<h2>${d.name}</h2>
          <p><strong>Märke:</strong> ${d.brand}</p>
          <p><em>Källa: DABAS</em></p>`
        );
      } else {
        const grade = (d.ecoscore_grade || "?").toUpperCase();
        const score = d.ecoscore_score ?? "–";
        openPopup(
          `<h2>${d.name}</h2>
          <p><strong>Märke:</strong> ${d.brand}</p>
          <p><strong>Eco-Score:</strong> ${grade} (${score})</p>
          ${d.category ? `<p><strong>Kategori:</strong> ${d.category}</p>` : ""}
          <p><em>Källa: OpenFoodFacts</em></p>`
        );
      }
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });
        video.srcObject = stream;
      } catch (error) {
        alert("Kunde inte starta kameran. Kontrollera kamerabehörighet.");
        console.error(error);
      }
    }

    takePhotoButton.addEventListener("click", async () => {
      const context = canvas.getContext("2d");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      context.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imageDataUrl = canvas.toDataURL("image/jpeg", 0.95);
      photo.src = imageDataUrl;
      downloadLink.href = imageDataUrl;
      downloadLink.download = "bild.jpg";
      downloadLink.style.display = "inline-block";

      try {
        const result = await reader.decodeFromImageUrl(imageDataUrl);
        await lookupBarcode(result.getText());
      } catch (err) {
        openPopup(`
          <h2>Ingen streckkod hittades</h2>
          <p>Försök igen med bättre ljus eller tydligare fokus.</p>
        `);
      }


    });

    startCamera();
  </script>
</body>
</html>
