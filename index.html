<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lettuce Decide</title>

    <style>
      :root {
        --bg: #f4f8ef;
        --surface: #ffffff;
        --surface-soft: #edf5e7;
        --text: #0f3321;
        --muted: #657469;
        --green: #244f2d;
        --green-light: #6da536;
        --green-dark: #092819;
        --border: #dbe7d4;
        --shadow: 0 12px 32px rgba(9, 40, 25, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        padding: 18px 14px 92px;
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        text-align: center;
      }

      .page {
        width: 100%;
        max-width: 560px;
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 18px;
      }

      .logo {
        width: min(320px, 82vw);
        height: auto;
        display: block;
      }

      .intro {
        margin-bottom: 18px;
        padding: 0 6px;
      }

      h1 {
        margin: 0;
        color: var(--green-dark);
        font-size: 30px;
        line-height: 1.1;
      }

      .subtitle {
        margin: 10px auto 0;
        max-width: 340px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.45;
      }

      .scanner-card {
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 22px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .scanner-card {
        padding: 12px;
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 4 / 3;
        max-height: calc(100vh - 260px);
        border-radius: 16px;
        background: #050806;
        object-fit: cover;
      }

      video.success {
        border: 4px solid var(--green-light);
        box-shadow: 0 0 20px var(--green-light);
      }

      .actions {
        display: flex;
        justify-content: center;
        padding: 14px 4px 4px;
      }

      button,
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        border: none;
        border-radius: 999px;
        padding: 0 22px;
        color: white;
        background: var(--green);
        box-shadow: 0 8px 18px rgba(36, 79, 45, 0.22);
        cursor: pointer;
        font: inherit;
        font-size: 16px;
        font-weight: 700;
        text-decoration: none;
      }

      button:hover,
      a:hover {
        background: var(--green);
      }

      #scanAgain {
        width: 100%;
        max-width: 260px;
        background: var(--green-light);
      }

      #scanAgain:hover {
        background: var(--green);
      }

      canvas {
        display: none;
      }

      h2 {
        margin: 0 0 12px;
        color: var(--green-dark);
        font-size: 18px;
      }

      img {
        display: block;
        width: 100%;
        border-radius: 16px;
        background: var(--surface-soft);
      }

      #result {
        margin-top: 14px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.45;
      }

      .popup-overlay {
        display: none;
        position: fixed;
        inset: 0;
        justify-content: center;
        align-items: center;
        padding: 18px;
        background: rgba(9, 40, 25, 0.58);
        z-index: 1000;
      }

      .popup-box {
        position: relative;
        width: 100%;
        max-width: 420px;
        border-radius: 22px;
        padding: 26px 22px 22px;
        background: var(--surface);
        text-align: left;
        box-shadow: 0 20px 50px rgba(9, 40, 25, 0.3);
      }

      .popup-box h2 {
        margin-right: 34px;
      }

      .close-popup {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 36px;
        min-height: 36px;
        height: 36px;
        padding: 0;
        border-radius: 50%;
        color: var(--green-dark);
        background: var(--surface-soft);
        box-shadow: none;
        font-size: 24px;
        line-height: 1;
      }

      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: space-around;
        align-items: center;
        background: white;
        padding: 10px 0;
        border-top: 1px solid #ddd;
        box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
        z-index: 2000;
        backdrop-filter: blur(12px);
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
      }

      .nav-item {
        min-height: auto;
        border: none;
        border-radius: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 0;
        padding: 0;
        color: #555;
        background: transparent;
        box-shadow: none;
        cursor: pointer;
        font-size: 14px;
        font-weight: 400;
      }

      .nav-item span {
        font-size: 22px;
        margin-bottom: 4px;
      }

    .nav-item.active {
      color: #0a7;
      background: transparent;
    }

    .nav-item:hover {
      background: transparent;
    }

      .favorite-btn.active {
        background: #d62828;
        color: white;
      }

      @media (min-width: 760px) {
        body {
          padding-top: 34px;
        }

        .page {
          max-width: 620px;
        }

        h1 {
          font-size: 36px;
        }
      }

      .popup-actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .share-btn {
        background: var(--surface-soft) !important;
        color: var(--green-dark) !important;
        border: 1px solid var(--border) !important;
        box-shadow: none !important;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <main class="page">
      <header class="topbar">
        <img class="logo" src="/logo.png" alt="Lettuce Decide" />
      </header>

      <section class="intro">
        <h1>Skanna. Lär dig mer. Välj grönare.</h1>
        <p class="subtitle">
          Ta en bild av en streckkod och få snabb produktinformation.
        </p>
      </section>

      <section class="scanner-card" aria-label="Kamera">
        <video id="video" autoplay playsinline></video>

        <div class="actions">
          <button id="scanAgain">Skanna ny produkt</button>
        </div>
        <div id="result"></div>
      </section>

      <canvas id="canvas"></canvas>

      <div id="popupOverlay" class="popup-overlay">
        <div class="popup-box">
          <button id="closePopup" class="close-popup">&times;</button>
          <div id="popupContent"></div>
        </div>
      </div>
    </main>

    <script type="module">
      import { BrowserMultiFormatReader } from "https://cdn.jsdelivr.net/npm/@zxing/browser@latest/+esm";

      const reader = new BrowserMultiFormatReader();

      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const scanAgainButton = document.getElementById("scanAgain");
      const resultElement = document.getElementById("result");
      const popupOverlay = document.getElementById("popupOverlay"); ///Pop-up
      const popupContent = document.getElementById("popupContent"); ///Pop-up
      const closePopupButton = document.getElementById("closePopup"); ///Pop-up

      scanAgainButton.style.display = "none";
      let doneScanning = false;

      function openPopup(html) {
        popupContent.innerHTML = html;
        popupOverlay.style.display = "flex";
      }

      function closePopup() {
        popupOverlay.style.display = "none";
      }

      closePopupButton.addEventListener("click", closePopup);

      popupOverlay.addEventListener("click", (e) => {
        if (e.target === popupOverlay) {
          closePopup();
        }
      });

      /* Favorite-knapp grejer*/
      async function addFavorite(barcode) {
        await fetch("/api/favorites", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          credentials: "include",
          body: JSON.stringify({ barcode }),
        });
      }

      async function removeFavorite(barcode) {
        await fetch(`/api/favorites/${barcode}`, {
          method: "DELETE",
          credentials: "include",
        });
      }

      async function isFavorite(barcode) {
        const res = await fetch("/api/favorites", {
          credentials: "include",
        });

        const favorites = await res.json();

        return favorites.includes(barcode);
      }

      async function toggleFavorite(barcode, button) {
        const currentlyFavorite = await isFavorite(barcode);

        if (currentlyFavorite) {
          await removeFavorite(barcode);
        } else {
          await addFavorite(barcode);
        }

        if (button) {
          if (!currentlyFavorite) {
            button.innerHTML = "❤️ Favorite";
            button.classList.add("active");
          } else {
            button.innerHTML = "🤍 Favorite";
            button.classList.remove("active");
          }
        }
      }
      window.toggleFavorite = toggleFavorite;

      async function shareProduct(name, brand) {
        const shareData = {
          title: name,
          text: `Dela produkten: ${name} från ${brand}`,
          url: window.location.href,
        };

        try {
          if (navigator.share) {
            await navigator.share(shareData);
          } else {
            alert("Delning stöds inte i denna webbläsare.");
          }
        } catch (err) {
          console.log("Delning avbröts");
        }
      }

      window.shareProduct = shareProduct;

      async function attachFavoriteButton(barcode) {
        const favoriteButton = document.querySelector(".favorite-btn");
        favoriteButton.addEventListener("click", async () => {
          const res = await fetch("/api/me", {
            credentials: "include",
          });
          if (!res.ok) {
            openPopup(`
            <h2>Logga in</h2>
            <p>Du måste logga in för att spara produkter.</p>
          `);
            return;
          }
          await toggleFavorite(barcode, favoriteButton);
        });
      }

      async function lookupBarcode(barcode) {
        resultElement.textContent = "Söker produkt...";

        const res = await fetch(`/api/lookup/${barcode}`);
        if (!res.ok) {
          openPopup(`<h2>Hittades inte</h2><p>Streckkod: ${barcode}</p>`);
          resultElement.textContent = null;
          return;
        }

        video.classList.add("success");
        const d = await res.json();

        let favoriteIcon = "🤍";
        try {
          favoriteIcon = (await isFavorite(barcode)) ? "❤️" : "🤍";
        } catch (err) {
          console.error(err);
        }

        const hasEnvironmentalData =
          d.co2_total !== null &&
          d.co2_total !== undefined &&
          String(d.co2_total).toLowerCase() !== "unknown" &&
          d.co2_total !== "?" &&
          d.ecoscore_grade !== null &&
          d.ecoscore_grade !== undefined &&
          String(d.ecoscore_grade).toLowerCase() !== "unknown" &&
          d.ecoscore_grade !== "?";

        const ecoScoreHtml =
          d.source !== "DABAS"
            ? hasEnvironmentalData
              ? `
                <p>
                  <strong>Miljödata:</strong><br>
                  Denna vara släpper ut ${d.co2_total} kg CO₂-ekvivalenter
                  och har Eco-Score ${(d.ecoscore_grade || "?").toUpperCase()}.
                </p>

                ${
                  d.category && d.category !== "?" && d.category !== "Unknown"
                    ? `<p><strong>Kategori:</strong> ${d.category}</p>`
                    : ""
                }
              `
              : `
                <p>
                  <strong>Miljödata:</strong><br>
                  Kunde inte hitta miljödata för produkten.
                </p>
              `
            : "";

        openPopup(`
        <h2>${d.name}</h2>

        <p><strong>Märke:</strong> ${d.brand}</p>

        ${
          d.warnings && d.warnings.length > 0
            ? `<p style="margin-bottom: 4px;"><strong>Varningar:</strong></p>
             <ul style="margin-top: 0; padding-left: 20px; color: #d62828;">
               ${d.warnings.map((warning) => `<li>${warning.trim()}</li>`).join("")}
             </ul>`
            : `<p><strong>Varningar:</strong> Inga</p>`
        }

        ${ecoScoreHtml}

        <p><em>Källa: ${d.source}</em></p>

        <div class="popup-actions">

          <button
            class="favorite-btn"
            data-barcode="${barcode}">
            ${favoriteIcon} Favorite
          </button>

          <button
            class="share-btn"
            onclick="shareProduct(
              '${d.name.replace(/'/g, "\\'")}',
              '${d.brand.replace(/'/g, "\\'")}'
            )">
            📤 Dela
          </button>

        </div>
      `);

        resultElement.textContent = null;

        attachFavoriteButton(barcode);
      }

      async function startCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 1920 },
              height: { ideal: 1080 },
            },
            audio: false,
          });
          video.srcObject = stream;
        } catch (error) {
          alert("Kunde inte starta kameran. Kontrollera kamerabehörighet.");
          console.error(error);
        }
      }

      async function startScanning() {
        resultElement.textContent = "Rikta kameran mot en streckkod...";

        await video.play();

        const result = await reader.decodeFromConstraints(
          {
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 1920 },
              height: { ideal: 1080 },
            },
            audio: false,
          },
          video,
          async (result, error) => {
            if (!result || doneScanning) return;

            doneScanning = true;

            let barcode = result.getText().trim();
            await lookupBarcode(barcode);
            scanAgainButton.style.display = "inline-block";
          },
        );
      }

      scanAgainButton.addEventListener("click", () => {
        doneScanning = false;
        scanAgainButton.style.display = "none";
        resultElement.textContent = "Rikta kameran mot en streckkod...";
        video.classList.remove("success");
      });

      await startCamera();
      await startScanning();
    </script>

    <nav class="bottom-nav">
      <a href="/" class="nav-item active">
        <span>&#127968;</span>
        <small>Hem</small>
      </a>

      <a href="/saved" class="nav-item">
        <span>&#10084;&#65039;</span>
        <small>Sparat</small>
      </a>

      <a href="/info" class="nav-item">
        <span>&#8505;&#65039;</span>
        <small>Info</small>
      </a>
    </nav>
  </body>
</html>
