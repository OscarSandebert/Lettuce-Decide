<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Sparade Produkter</title>

    <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 16px;
      padding-bottom: 100px;
      background: #f5f5f5;
      text-align: center;
    }
    video {
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      background: black;
    }
    video,
    canvas,
    img {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      margin-top: 16px;
    }

    button,
    a {
      display: inline-block;
      margin: 12px 6px;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      background: #222;
      color: white;
      text-decoration: none;
      cursor: pointer;
      font-size: 16px;
    }

    a {
      background: #0a7;
    }
   

    /* Navigation Panel */
    body {
      padding-bottom: 100px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: white;
      padding: 10px 0;
      border-top: 1px solid #ddd;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
      z-index: 2000;
      backdrop-filter: blur(12px);
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
    }

    .nav-item {
      background: none;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 14px;
      color: #555;
      cursor: pointer;
    }

    .nav-item span {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .nav-item.active {
      color: #0a7;
    }

    .scan-button span {
      font-size: 28px;
    }
  </style>
</head>
<body>
    <h1>Under Uppbyggnad</h1>
    <p>Här kommer det visas antingen info eller profil.</p>

  <!-- Bottom navigation -->

  <nav class="bottom-nav">

    <a href="index.html" class="nav-item">
      <span>🏠</span>
      <small>Hem</small>
    </a>

    <a href="saved.html" class="nav-item">
      <span>❤️</span>
      <small>Sparat</small>
    </a>

    <a href="info.html" class="nav-item active">
      <span>ℹ️</span>
      <small>Info</small>

    </a>

  </nav>
</body>
</html>
